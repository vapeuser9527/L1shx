<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>三角洲子弹 · 交易与社区</title>
  <!-- Chart.js 用于价格谷峰图 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <!-- Gun.js 用于去中心化聊天室 -->
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.min.js"></script>
  <style>
    :root {
      --bg-start: #f0f4fa;
      --glass-bg: rgba(255, 255, 255, 0.56);
      --glass-border: rgba(255, 255, 255, 0.7);
      --blur: 24px;
      --text-primary: #1c1c1e;
      --text-secondary: #6e6e73;
      --text-tertiary: #8e8e93;
      --accent-blue: #0071e3;
      --accent-green: #34c759;
      --accent-red: #ff3b30;
      --accent-orange: #ff9500;
      --accent-purple: #af52de;
      --accent-teal: #5ac8fa;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
      --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.06), 0 2px 8px rgba(0, 0, 0, 0.03);
      --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.08), 0 4px 16px rgba(0, 0, 0, 0.04);
      --radius-sm: 14px;
      --radius-md: 20px;
      --radius-lg: 28px;
      --radius-xl: 34px;
      --transition-smooth: 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
      --transition-spring: 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: linear-gradient(160deg, #e8eef8 0%, #eef1f9 20%, #f2f0f8 40%, #f0f4fa 60%, #eceff7 80%, #e9ecf6 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
      position: relative;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.5s ease;
    }

    /* 背景光晕 */
    body::before, body::after {
      content: ''; position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
    }
    body::before { top: -20%; right: -20%; width: 60vw; height: 60vw; background: radial-gradient(ellipse, rgba(90,200,250,0.08) 0%, transparent 70%); }
    body::after { bottom: -25%; left: -18%; width: 55vw; height: 55vw; background: radial-gradient(ellipse, rgba(175,82,222,0.06) 0%, transparent 70%); }

    /* 开屏动画 */
    .splash-screen {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(240,244,250,0.9); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.6s ease, visibility 0.6s;
      opacity: 1; visibility: visible;
      flex-direction: column; gap: 16px;
    }
    .splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-logo {
      width: 70px; height: 70px; border-radius: 22px;
      background: linear-gradient(135deg, #ff6b35, #ff3b30);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; color: #fff; box-shadow: 0 12px 32px rgba(255,59,48,0.3);
      animation: splashPulse 1.2s ease-in-out infinite;
    }
    @keyframes splashPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }
    .splash-text {
      font-size: 1.25rem; font-weight: 700; color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    /* 主容器 */
    .app-container {
      max-width: 600px; margin: 0 auto; padding: 16px 16px 0; position: relative; z-index: 1;
      display: flex; flex-direction: column; min-height: 100vh;
    }

    /* 动态岛标题 */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 4px 12px; position: sticky; top: 10px; z-index: 50;
    }
    .header-pill {
      display: flex; align-items: center; gap: 10px;
      background: var(--glass-bg); backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--glass-border); border-radius: 40px;
      padding: 8px 18px; box-shadow: var(--shadow-md);
      transition: var(--transition-smooth);
    }
    .header-icon {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #ff6b35, #ff3b30);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; color: #fff; flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(255,59,48,0.25);
    }
    .header-title { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }

    /* 内容区滚动 */
    .content-area {
      flex: 1; overflow-y: auto; padding-bottom: 100px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .content-area::-webkit-scrollbar { width: 3px; }
    .content-area::-webkit-scrollbar-thumb { background: rgba(180,180,195,0.35); border-radius: 10px; }

    /* 卡片通用 */
    .card {
      background: var(--glass-bg); backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--glass-border); border-radius: var(--radius-lg);
      padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow-sm);
      transition: var(--transition-smooth);
    }
    .card:hover { box-shadow: var(--shadow-md); }

    /* 概览卡 */
    .overview-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px;
    }
    .overview-card {
      background: var(--glass-bg); backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--glass-border); border-radius: var(--radius-md);
      padding: 14px 10px; text-align: center; box-shadow: var(--shadow-sm);
      transition: var(--transition-smooth); cursor: default;
    }
    .overview-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .overview-label { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-tertiary); margin-bottom: 4px; }
    .overview-value { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.03em; }
    .overview-sub { font-size: 0.6rem; color: var(--text-tertiary); margin-top: 2px; }

    /* 底部导航 */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 80;
      background: rgba(255,255,255,0.62); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.6); padding: 8px 0 calc(8px + var(--safe-bottom));
      display: flex; justify-content: space-around; align-items: center;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      font-size: 0.65rem; font-weight: 600; color: var(--text-tertiary);
      transition: var(--transition-smooth); cursor: pointer; padding: 4px 12px;
      border-radius: 20px; background: transparent;
    }
    .nav-item.active { color: var(--accent-blue); background: rgba(0,113,227,0.08); }
    .nav-item i { font-size: 1.3rem; font-style: normal; }

    /* 表格/交易记录 */
    .record-item {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.45); border: 1px solid rgba(220,220,235,0.5);
      border-radius: var(--radius-md); padding: 10px 12px; transition: var(--transition-fast);
      margin-bottom: 8px; box-shadow: var(--shadow-sm);
    }
    .record-item:hover { box-shadow: var(--shadow-md); }
    .badge { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.7rem; flex-shrink: 0; }
    .badge.buy { background: rgba(52,199,89,0.15); color: #1e8449; }
    .badge.sell { background: rgba(255,59,48,0.13); color: #c0392b; }
    .record-info { flex: 1; min-width: 0; }
    .record-info .top { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .record-info .bullet { font-weight: 700; font-size: 0.85rem; }
    .record-info .date-sm { font-size: 0.68rem; color: var(--text-tertiary); margin-left: auto; }

    /* 价格芯片 */
    .price-chip {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.55); border: 1px solid rgba(200,200,210,0.5);
      border-radius: 24px; padding: 6px 10px 6px 14px;
      font-size: 0.75rem; font-weight: 600; transition: var(--transition-fast);
    }
    .price-chip input { width: 55px; border: none; background: rgba(240,242,248,0.8); border-radius: 14px; padding: 4px 6px; text-align: center; font-weight: 600; font-family: inherit; outline: none; }

    /* 图表容器 */
    .chart-container { position: relative; height: 220px; margin: 8px 0; }

    /* 聊天室 */
    .chat-messages {
      height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
      padding-right: 4px; margin-bottom: 12px;
    }
    .chat-msg {
      max-width: 85%; padding: 10px 14px; border-radius: 20px;
      font-size: 0.85rem; line-height: 1.4; word-break: break-word;
      background: rgba(255,255,255,0.7); align-self: flex-start;
      box-shadow: var(--shadow-sm);
    }
    .chat-msg.self { align-self: flex-end; background: rgba(0,113,227,0.15); }
    .chat-msg .sender { font-weight: 700; font-size: 0.7rem; color: var(--accent-blue); margin-bottom: 2px; }
    .chat-msg .time { font-size: 0.6rem; color: var(--text-tertiary); float: right; margin-left: 8px; }
    .chat-input-row { display: flex; gap: 8px; }
    .chat-input-row input { flex: 1; padding: 10px 14px; border-radius: 22px; border: 1px solid rgba(200,200,215,0.6); background: rgba(255,255,255,0.6); font-family: inherit; outline: none; }
    .chat-input-row button { padding: 10px 18px; border-radius: 22px; background: var(--accent-blue); color: #fff; border: none; font-weight: 600; cursor: pointer; }

    /* 弹窗 */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.35); backdrop-filter: blur(6px);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-content {
      background: rgba(255,255,255,0.82); backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,0.7); border-radius: var(--radius-xl);
      padding: 22px; width: 90%; max-width: 440px; box-shadow: var(--shadow-lg);
      animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px) scale(0.94); } to { opacity: 1; transform: translateY(0) scale(1); } }

    /* 按钮 */
    .btn { padding: 10px 18px; border-radius: 22px; font-weight: 600; cursor: pointer; transition: var(--transition-spring); border: none; font-family: inherit; }
    .btn-primary { background: var(--accent-blue); color: #fff; box-shadow: 0 4px 14px rgba(0,113,227,0.3); }
    .btn-primary:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(0,113,227,0.4); }
    .btn-small { padding: 6px 12px; font-size: 0.75rem; }

    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(30,30,35,0.9); backdrop-filter: blur(20px); color: #fff;
      padding: 10px 20px; border-radius: 24px; font-size: 0.8rem; font-weight: 600;
      z-index: 300; box-shadow: var(--shadow-lg); pointer-events: none;
      animation: toastIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275), toastOut 0.3s ease 2s forwards;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-30px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { from { opacity: 1; transform: translateX(-50%) translateY(0); } to { opacity: 0; transform: translateX(-50%) translateY(-20px); } }
  </style>
</head>
<body>

<!-- 开屏动画 -->
<div class="splash-screen" id="splashScreen">
  <div class="splash-logo">🎯</div>
  <div class="splash-text">三角洲子弹</div>
</div>

<!-- 主应用 -->
<div class="app-container" id="appContainer">
  <div class="header">
    <div class="header-pill">
      <div class="header-icon">🎯</div>
      <span class="header-title">三角洲子弹</span>
    </div>
  </div>

  <!-- 页面内容区 -->
  <div class="content-area" id="contentArea">
    <!-- 页面1：交易记录 -->
    <div id="page-trades" class="page">
      <div class="overview-grid" id="overviewGrid"></div>
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <strong>📋 交易记录</strong>
          <div>
            <button class="btn btn-small" onclick="openBulletManager()" style="margin-right:6px;">⚙️ 品种</button>
            <input type="date" id="filterDate" style="padding:6px 10px; border-radius:16px; border:1px solid #ccc; background:rgba(255,255,255,0.7); font-family:inherit;" onchange="refreshAll()">
          </div>
        </div>
        <div id="tradeForm" style="margin-bottom:12px;">
          <div style="display:flex; gap:6px; flex-wrap:wrap; align-items:center;">
            <select id="tradeType" style="padding:8px 12px; border-radius:18px; border:1px solid #ccc; background:rgba(255,255,255,0.7);">
              <option value="buy">🟢 买入</option>
              <option value="sell">🔴 卖出</option>
            </select>
            <select id="tradeBullet" style="padding:8px 12px; border-radius:18px; border:1px solid #ccc; background:rgba(255,255,255,0.7);"></select>
            <input type="number" id="tradeQty" placeholder="数量" value="1" min="1" style="width:70px; padding:8px; border-radius:18px; border:1px solid #ccc; background:rgba(255,255,255,0.7);" oninput="calcTradeTotal()">
            <input type="number" id="tradePrice" placeholder="单价" value="0" step="0.01" style="width:80px; padding:8px; border-radius:18px; border:1px solid #ccc; background:rgba(255,255,255,0.7);" oninput="calcTradeTotal()">
            <span id="tradeTotalDisplay" style="font-weight:700; min-width:60px;">¥0</span>
            <button class="btn btn-primary btn-small" onclick="submitTrade()">记录</button>
          </div>
        </div>
        <div id="recordList"></div>
      </div>
      <div class="card">
        <strong>📊 每日盈亏</strong>
        <div id="dailySummary" style="margin-top:8px;"></div>
      </div>
    </div>

    <!-- 页面2：价格图表 -->
    <div id="page-chart" class="page" style="display:none;">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <strong>📈 价格谷峰图</strong>
          <select id="chartBulletSelect" onchange="updateChart()" style="padding:8px 12px; border-radius:18px; border:1px solid #ccc; background:rgba(255,255,255,0.7);"></select>
        </div>
        <div class="chart-container">
          <canvas id="priceChart" width="400" height="180"></canvas>
        </div>
        <p style="font-size:0.7rem; color:var(--text-tertiary);">基于交易记录中的单价绘制</p>
      </div>
    </div>

    <!-- 页面3：聊天室 -->
    <div id="page-chat" class="page" style="display:none;">
      <div class="card">
        <div style="display:flex; gap:8px; align-items:center; margin-bottom:12px;">
          <span>💬 子弹交流室</span>
          <input type="text" id="chatNickname" placeholder="昵称" maxlength="12" style="width:90px; padding:6px 10px; border-radius:16px; border:1px solid #ccc; background:rgba(255,255,255,0.7);" onchange="saveNickname()">
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="说点什么..." onkeydown="if(event.key==='Enter')sendMessage()">
          <button onclick="sendMessage()">发送</button>
        </div>
        <p style="font-size:0.65rem; color:var(--text-tertiary); margin-top:6px;">✨ 使用Gun.js去中心网络，消息实时同步</p>
      </div>
    </div>
  </div>

  <!-- 底部导航 -->
  <div class="bottom-nav" id="bottomNav">
    <div class="nav-item active" data-page="trades"><i>📒</i>交易</div>
    <div class="nav-item" data-page="chart"><i>📈</i>图表</div>
    <div class="nav-item" data-page="chat"><i>💬</i>聊天</div>
  </div>
</div>

<!-- 品种管理弹窗 -->
<div class="modal-overlay" id="bulletModal" style="display:none;">
  <div class="modal-content">
    <h3>🔧 子弹品种管理</h3>
    <div id="bulletManageList" style="display:flex; flex-wrap:wrap; gap:8px; margin:12px 0;"></div>
    <div style="display:flex; gap:8px;">
      <input type="text" id="newBulletName" placeholder="新品种名称" maxlength="20" style="flex:1; padding:10px; border-radius:20px; border:1px solid #ccc;">
      <button class="btn btn-primary btn-small" onclick="addBulletType()">添加</button>
    </div>
    <button style="margin-top:14px; width:100%; padding:10px; border-radius:20px; border:1px solid #ccc; background:rgba(255,255,255,0.6);" onclick="closeBulletManager()">关闭</button>
  </div>
</div>

<div id="toastContainer"></div>

<script>
  (() => {
    // ==================== 数据存储 ====================
    const STORAGE_TRANS = 'delta_trans';
    const STORAGE_BULLETS = 'delta_bullets';
    const DEFAULT_BULLETS = ['5.56mm', '7.62mm', '9mm', '.45 ACP', '12号霰弹', '.50 BMG'];
    let transactions = JSON.parse(localStorage.getItem(STORAGE_TRANS) || '[]');
    let bulletTypes = JSON.parse(localStorage.getItem(STORAGE_BULLETS) || JSON.stringify(DEFAULT_BULLETS));

    function saveTrans() { localStorage.setItem(STORAGE_TRANS, JSON.stringify(transactions)); }
    function saveBullets() { localStorage.setItem(STORAGE_BULLETS, JSON.stringify(bulletTypes)); }

    // ==================== 工具函数 ====================
    function genId() { return 'txn_' + Date.now() + Math.random().toString(36).slice(2,8); }
    function formatCurrency(v) { return '¥' + v.toFixed(2); }
    function escapeHTML(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function showToast(msg) {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => { if(t.parentNode) t.remove(); }, 2300);
    }

    // ==================== 交易逻辑 ====================
    function calcTradeTotal() {
      const qty = parseInt(document.getElementById('tradeQty').value) || 0;
      const price = parseFloat(document.getElementById('tradePrice').value) || 0;
      document.getElementById('tradeTotalDisplay').textContent = formatCurrency(qty * price);
    }

    window.submitTrade = function() {
      const type = document.getElementById('tradeType').value;
      const bullet = document.getElementById('tradeBullet').value;
      const qty = parseInt(document.getElementById('tradeQty').value);
      const price = parseFloat(document.getElementById('tradePrice').value);
      const date = document.getElementById('filterDate').value || new Date().toISOString().slice(0,10);
      if (!bullet || !qty || isNaN(price) || price < 0) return showToast('请完整填写');
      transactions.push({
        id: genId(), date, type, bullet, quantity: qty, unitPrice: price, total: qty*price, timestamp: Date.now()
      });
      transactions.sort((a,b) => a.timestamp - b.timestamp);
      saveTrans();
      document.getElementById('tradeQty').value = 1;
      document.getElementById('tradePrice').value = '0';
      calcTradeTotal();
      refreshAll();
      showToast('记录成功');
    };

    window.deleteTransaction = function(id) {
      if(!confirm('删除这条记录？')) return;
      transactions = transactions.filter(t => t.id !== id);
      saveTrans();
      refreshAll();
      showToast('已删除');
    };

    // 盈亏计算 (FIFO)
    function calcPnL() {
      const sorted = [...transactions].sort((a,b) => a.timestamp - b.timestamp);
      const holdings = {};
      const sellResults = [];
      for(const tx of sorted) {
        if(!holdings[tx.bullet]) holdings[tx.bullet] = [];
        if(tx.type === 'buy') {
          holdings[tx.bullet].push({ qty: tx.quantity, price: tx.unitPrice });
        } else {
          let remaining = tx.quantity, cost = 0;
          while(remaining > 0 && holdings[tx.bullet].length) {
            const batch = holdings[tx.bullet][0];
            const take = Math.min(remaining, batch.qty);
            cost += take * batch.price;
            remaining -= take;
            batch.qty -= take;
            if(batch.qty <= 0) holdings[tx.bullet].shift();
          }
          const avgCost = tx.quantity ? cost / tx.quantity : 0;
          sellResults.push({ ...tx, pnl: (tx.unitPrice - avgCost) * tx.quantity });
        }
      }
      const totalPnl = sellResults.reduce((s,r) => s + r.pnl, 0);
      const totalProfit = sellResults.filter(r => r.pnl > 0).reduce((s,r) => s + r.pnl, 0);
      const totalLoss = sellResults.filter(r => r.pnl < 0).reduce((s,r) => s + Math.abs(r.pnl), 0);
      return { totalPnl, totalProfit, totalLoss, sellResults };
    }

    function renderOverview() {
      const { totalPnl, totalProfit, totalLoss } = calcPnL();
      document.getElementById('overviewGrid').innerHTML = `
        <div class="overview-card"><div class="overview-label">总盈亏</div><div class="overview-value" style="color:${totalPnl>=0?'var(--accent-green)':'var(--accent-red)'}">${formatCurrency(totalPnl)}</div></div>
        <div class="overview-card"><div class="overview-label">总盈利</div><div class="overview-value" style="color:var(--accent-green)">${formatCurrency(totalProfit)}</div></div>
        <div class="overview-card"><div class="overview-label">总亏损</div><div class="overview-value" style="color:var(--accent-red)">${formatCurrency(totalLoss)}</div></div>
      `;
    }

    function renderRecords() {
      const dateFilter = document.getElementById('filterDate').value;
      let filtered = dateFilter ? transactions.filter(t => t.date === dateFilter) : transactions;
      filtered = [...filtered].sort((a,b) => b.timestamp - a.timestamp);
      const { sellResults } = calcPnL();
      const pnlMap = {};
      sellResults.forEach(r => pnlMap[r.id] = r.pnl);
      const list = document.getElementById('recordList');
      if(filtered.length === 0) {
        list.innerHTML = '<p style="text-align:center; color:var(--text-tertiary); padding:20px;">暂无记录</p>';
        return;
      }
      list.innerHTML = filtered.map(tx => {
        const pnl = pnlMap[tx.id];
        let pnlHtml = '';
        if(tx.type === 'sell' && pnl !== undefined) {
          const cls = pnl > 0 ? 'positive' : 'negative';
          pnlHtml = `<span style="font-weight:700; color:${pnl>0?'var(--accent-green)':'var(--accent-red)'};">${pnl>0?'+':''}¥${pnl.toFixed(2)}</span>`;
        }
        return `<div class="record-item">
          <div class="badge ${tx.type}">${tx.type==='buy'?'买':'卖'}</div>
          <div class="record-info">
            <div class="top"><span class="bullet">${escapeHTML(tx.bullet)}</span> ×${tx.quantity} <span class="date-sm">${tx.date}</span></div>
            <div style="font-size:0.73rem;">单价 ¥${tx.unitPrice.toFixed(2)} 总价 ¥${tx.total.toFixed(2)}</div>
          </div>
          ${pnlHtml}
          <button style="background:none;border:none;cursor:pointer;opacity:0.6;" onclick="deleteTransaction('${tx.id}')">🗑</button>
        </div>`;
      }).join('');
    }

    function renderDailySummary() {
      const { sellResults } = calcPnL();
      const daily = {};
      sellResults.forEach(r => { daily[r.date] = (daily[r.date]||0) + r.pnl; });
      const entries = Object.entries(daily).sort((a,b) => b[0].localeCompare(a[0])).slice(0,14);
      document.getElementById('dailySummary').innerHTML = entries.length ? entries.map(([d,p])=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.05);"><span>${d}</span><span style="font-weight:700;color:${p>=0?'var(--accent-green)':'var(--accent-red)'};">${formatCurrency(p)}</span></div>`).join('') : '<p style="color:var(--text-tertiary);">暂无卖出记录</p>';
    }

    // ==================== 品种管理 ====================
    function renderBulletSelects() {
      const selects = ['tradeBullet', 'chartBulletSelect'];
      selects.forEach(id => {
        const sel = document.getElementById(id);
        if(!sel) return;
        sel.innerHTML = bulletTypes.map(b => `<option value="${escapeHTML(b)}">${escapeHTML(b)}</option>`).join('');
      });
    }

    window.openBulletManager = function() {
      document.getElementById('bulletModal').style.display = 'flex';
      renderBulletManager();
    };
    window.closeBulletManager = function() { document.getElementById('bulletModal').style.display = 'none'; };
    function renderBulletManager() {
      document.getElementById('bulletManageList').innerHTML = bulletTypes.map(b => `
        <span style="background:rgba(240,242,248,0.8); border-radius:20px; padding:6px 12px; display:flex; align-items:center; gap:6px;">
          ${escapeHTML(b)} <button onclick="removeBullet('${escapeHTML(b)}')" style="background:none;border:none;color:red;cursor:pointer;">×</button>
        </span>`).join('');
    }
    window.removeBullet = function(name) {
      if(bulletTypes.length <= 1) return showToast('至少保留一个品种');
      bulletTypes = bulletTypes.filter(b => b !== name);
      saveBullets();
      renderBulletManager();
      renderBulletSelects();
      refreshAll();
    };
    window.addBulletType = function() {
      const name = document.getElementById('newBulletName').value.trim();
      if(!name) return showToast('请输入名称');
      if(bulletTypes.includes(name)) return showToast('已存在');
      bulletTypes.push(name);
      saveBullets();
      renderBulletManager();
      renderBulletSelects();
      refreshAll();
      document.getElementById('newBulletName').value = '';
    };

    // ==================== 图表 ====================
    let priceChart;
    function updateChart() {
      const bullet = document.getElementById('chartBulletSelect').value;
      const data = transactions.filter(t => t.bullet === bullet).sort((a,b) => a.timestamp - b.timestamp);
      const labels = data.map(t => t.date);
      const prices = data.map(t => t.unitPrice);
      const ctx = document.getElementById('priceChart').getContext('2d');
      if(priceChart) priceChart.destroy();
      priceChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: bullet + ' 单价',
            data: prices,
            borderColor: '#0071e3',
            backgroundColor: 'rgba(0,113,227,0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 3,
            pointHoverRadius: 6,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: false, grid: { color: 'rgba(0,0,0,0.05)' } },
            x: { grid: { display: false } }
          }
        }
      });
    }

    // ==================== 聊天室 (Gun.js) ====================
    let gun, chatNode;
    const CHAT_KEY = 'delta-bullet-chat';
    function initChat() {
      gun = Gun(['https://gun-manhattan.herokuapp.com/gun', 'https://gunjs.herokuapp.com/gun']);
      chatNode = gun.get(CHAT_KEY);
      // 加载历史消息
      chatNode.map().once((msg, id) => {
        if(msg && msg.text) displayMessage(msg, id);
      });
      // 监听新消息
      chatNode.map().on((msg, id) => {
        if(msg && msg.text) {
          const existing = document.getElementById(`msg-${id}`);
          if(!existing) displayMessage(msg, id);
        }
      });
    }
    function displayMessage(msg, id) {
      const container = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.id = `msg-${id}`;
      div.className = `chat-msg ${msg.nick === getNickname() ? 'self' : ''}`;
      div.innerHTML = `<span class="sender">${escapeHTML(msg.nick || '匿名')}</span> <span class="time">${msg.time || ''}</span><br>${escapeHTML(msg.text)}`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
    function getNickname() {
      return localStorage.getItem('chatNick') || '枪手' + Math.floor(Math.random()*1000);
    }
    window.saveNickname = function() {
      const nick = document.getElementById('chatNickname').value.trim();
      if(nick) localStorage.setItem('chatNick', nick);
    };
    window.sendMessage = function() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if(!text) return;
      const nick = getNickname();
      const time = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
      chatNode.set({ nick, text, time, timestamp: Date.now() });
      input.value = '';
    };
    document.getElementById('chatNickname').value = getNickname();

    // ==================== 页面导航 ====================
    function switchPage(page) {
      document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
      document.getElementById(`page-${page}`).style.display = 'block';
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.querySelector(`.nav-item[data-page="${page}"]`).classList.add('active');
      if(page === 'chart') updateChart();
    }
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => switchPage(item.dataset.page));
    });

    // ==================== 刷新全部 ====================
    function refreshAll() {
      renderOverview();
      renderRecords();
      renderDailySummary();
      renderBulletSelects();
    }

    // ==================== 开屏动画 ====================
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('splashScreen').classList.add('hidden');
      }, 1800);
    });

    // ==================== 初始化 ====================
    document.getElementById('filterDate').value = new Date().toISOString().slice(0,10);
    refreshAll();
    initChat();
    // 默认显示交易页
    switchPage('trades');
  })();
</script>
</body>
</html>
